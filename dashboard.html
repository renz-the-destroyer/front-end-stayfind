<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayFind - Complete Your Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:400,600,800');
        :root { --primary: #0d47a1; --secondary: #42a5f5; --bg: #f0f4f8; --text: #37474f; }
        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }
        body { background-color: var(--bg); display: flex; justify-content: center; align-items: center; font-family: 'Montserrat', sans-serif; min-height: 100vh; margin: 0; color: var(--text); }
        #loader { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .dashboard-card { background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; padding: 40px; text-align: center; margin: 20px; }
        .brand { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        .brand span { color: var(--secondary); }
        h2 { font-size: 20px; margin-bottom: 20px; color: var(--primary); }
        .form-group { text-align: left; margin-bottom: 18px; position: relative; }
        label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #90a4ae; margin-left: 5px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: var(--secondary); font-size: 14px; }
        input { width: 100%; padding: 12px 15px 12px 40px; background: #f8fbff; border: 2px solid #e3f2fd; border-radius: 8px; font-family: inherit; font-size: 14px; }
        input:focus { border-color: var(--secondary); outline: none; background: #fff; }
        .role-container { display: flex; gap: 10px; margin-top: 8px; }
        .role-box { flex: 1; padding: 15px; border: 2px solid #e3f2fd; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; display: flex; flex-direction: column; gap: 5px; align-items: center; background: #fff; }
        .role-box i { font-size: 20px; }
        .role-box.active { border-color: var(--primary); background: #e3f2fd; color: var(--primary); }
        .save-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 30px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 25px; cursor: pointer; box-shadow: 0 4px 12px rgba(13, 71, 161, 0.2); }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(13, 71, 161, 0.3); }
        .logout-link { display: block; margin-top: 20px; font-size: 12px; color: #90a4ae; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary)"></i></div>

    <div class="dashboard-card">
        <div class="brand">Stay<span>Find</span></div>
        <h2>Setup Your Profile</h2>
        
        <form id="profileForm">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullName" placeholder="Juan Dela Cruz" required>
                </div>
            </div>

            <div class="form-group">
                <label>Current Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" id="address" placeholder="City, Province" required>
                </div>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <div class="input-wrapper">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="contact" placeholder="09123456789" pattern="[0-9]{11}" required title="Please enter 11-digit mobile number">
                </div>
            </div>

            <div class="form-group">
                <label>Identify as</label>
                <div class="role-container">
                    <div class="role-box" id="roleTenant">
                        <i class="fas fa-user-tag"></i> Tenant
                    </div>
                    <div class="role-box" id="roleLandlord">
                        <i class="fas fa-house-user"></i> Landlord
                    </div>
                </div>
            </div>

            <button type="submit" class="save-btn" id="saveBtn">Complete Setup</button>
        </form>

        <a class="logout-link" id="logoutBtn">Logout and exit</a>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
